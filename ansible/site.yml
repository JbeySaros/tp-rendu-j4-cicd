- name: Déploiement de l'application Flask FormaTech
  hosts: web
  become: true
  serial: 1
  vars:
    app_dir: /opt/formatech
    app_version: "1.0.0"
    app_port: 5000

  tasks:
    - name: Installer Python et dépendances
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - curl
        state: present
        update_cache: true
      tags: [install]

    - name: Créer le répertoire applicatif
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'
      tags: [install]

    - name: Déployer le code applicatif depuis l'artefact
      ansible.builtin.unarchive:
        src: "{{ playbook_dir }}/../artifact/app.tar.gz"
        dest: "{{ app_dir }}"
        remote_src: false
      tags: [deploy]

    - name: Installer les dépendances Python de l'app
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
      tags: [deploy]

    - name: Stopper l'ancienne instance Flask
      ansible.builtin.shell: |
        if pgrep -f "python3.*app.py" > /dev/null; then
          pkill -f "python3.*app.py"
        fi
      ignore_errors: true
      changed_when: false

    - name: Démarrer Flask en background
      ansible.builtin.shell: |
        cd {{ app_dir }}
        APP_VERSION={{ app_version }} nohup python3 app.py > /var/log/flask.log 2>&1 &
        sleep 2
      tags: [deploy]

    - name: Health check avec retry (max 30s)
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      retries: 10
      delay: 3
      register: health
      until: health.status == 200
      tags: [healthcheck]

    - name: Afficher la version déployée
      ansible.builtin.debug:
        msg: "✅ {{ inventory_hostname }} déployé en version {{ app_version }}"
